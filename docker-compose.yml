version: '3.8'

services:
  guacd:
    container_name: guacd
    image: guacamole/guacd:latest
    restart: always
    network_mode: host # Allows Guacd to talk directly to local XRDP on port 3389

  postgres:
    container_name: postgres
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: guacamole_user
      POSTGRES_PASSWORD: SomeStrongPassword123!
      POSTGRES_DB: guacamole_db
    volumes:
      - ./data/initdb.sql:/docker-entrypoint-initdb.d/initdb.sql
      - postgres_data:/var/lib/postgresql/data

  guacamole:
    container_name: guacamole
    image: guacamole/guacamole:latest
    restart: always
    ports:
      - "8080:8080"
    environment:
      GUACD_HOSTNAME: 127.0.0.1
      GUACD_PORT: 4822
      POSTGRES_HOSTNAME: postgres
      POSTGRES_DATABASE: guacamole_db
      POSTGRES_USER: guacamole_user
      POSTGRES_PASSWORD: SomeStrongPassword123!
      # Google OIDC Configuration
      OPENID_AUTHORIZATION_ENDPOINT: https://accounts.google.com/o/oauth2/v2/auth
      OPENID_JWKS_ENDPOINT: https://www.googleapis.com/oauth2/v3/certs
      OPENID_ISSUER: https://accounts.google.com
      OPENID_CLIENT_ID: YOUR_GOOGLE_CLIENT_ID_HERE # Get this from Google Cloud Console
      OPENID_REDIRECT_URI: https://workspace.yourclientdomain.com/guacamole/
    volumes:
      - ./extensions:/opt/guacamole/extensions
    depends_on:
      - postgres
      - guacd

volumes:
  postgres_data: