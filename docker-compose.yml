version: '3.8'

services:
  guacd:
    container_name: guacd
    image: guacamole/guacd:latest
    restart: always
    network_mode: host # Allows Guacd to talk directly to local XRDP on port 3389

  postgres:
    container_name: postgres
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: guacamole_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: guacamole_db
    volumes:
      - ./data/initdb.sql:/docker-entrypoint-initdb.d/01-initdb.sql
      - ./data/02-create-test-user.sql:/docker-entrypoint-initdb.d/02-create-test-user.sql
      - postgres_data:/var/lib/postgresql/data

  guacamole:
    container_name: guacamole
    image: guacamole/guacamole:latest
    restart: always
    ports:
      - "8080:8080"
    environment:
      GUACD_HOSTNAME: host.docker.internal
      GUACD_PORT: 4822
      POSTGRESQL_HOSTNAME: postgres
      POSTGRESQL_DATABASE: guacamole_db
      POSTGRESQL_USERNAME: guacamole_user
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
      LOG_LEVEL: debug
      # Google OIDC Configuration
      OPENID_AUTHORIZATION_ENDPOINT: https://accounts.google.com/o/oauth2/v2/auth
      OPENID_JWKS_ENDPOINT: https://www.googleapis.com/oauth2/v3/certs
      OPENID_ISSUER: https://accounts.google.com
      OPENID_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      OPENID_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OPENID_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      OPENID_USERNAME_CLAIM_TYPE: email
      EXTENSION_PRIORITY: openid, postgresql
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./extensions:/opt/guacamole/extensions
    depends_on:
      - postgres
      - guacd

volumes:
  postgres_data:
