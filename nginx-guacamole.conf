server {
    listen 80;
    server_name workspace.yourclientdomain.com; # Replace with your actual domain

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name workspace.yourclientdomain.com; # Replace with your actual domain

    # SSL configuration (Let's Encrypt paths)
    ssl_certificate /etc/letsencrypt/live/workspace.yourclientdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/workspace.yourclientdomain.com/privkey.pem;

    # Recommended SSL security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # Guacamole proxy pass
    location / {
        # Redirect root to /guacamole/
        return 301 /guacamole/;
    }

    location /guacamole/ {
        proxy_pass http://127.0.0.1:8080/guacamole/;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        access_log off;
    }
}